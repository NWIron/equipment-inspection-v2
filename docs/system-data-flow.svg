  <script><![CDATA[
    (function () {
      var buttons = Array.prototype.slice.call(document.querySelectorAll('.button'));
      var nodes = Array.prototype.slice.call(document.querySelectorAll('.node-card'));
      var edges = Array.prototype.slice.call(document.querySelectorAll('.edge'));

      function hasFocusTag(element, focus) {
        var tags = (element.getAttribute('data-tags') || '').split(/\s+/).filter(Boolean);
        return focus === 'overview' || tags.indexOf(focus) >= 0 || tags.indexOf('overview') >= 0 && focus === 'overview';
      }

      function applyFocus(focus) {
        buttons.forEach(function (button) {
          button.classList.toggle('active', button.getAttribute('data-focus') === focus);
        });

        nodes.forEach(function (node) {
          var active = hasFocusTag(node, focus);
          node.classList.toggle('dimmed', !active);
        });

        edges.forEach(function (edge) {
          var active = hasFocusTag(edge, focus);
          edge.classList.toggle('active', active);
          edge.classList.toggle('dimmed', !active);
        });
      }

      buttons.forEach(function (button) {
        button.addEventListener('click', function () {
          nodes.forEach(function (node) { node.classList.remove('selected'); });
          applyFocus(button.getAttribute('data-focus'));
        });
      });

      nodes.forEach(function (node) {
        node.addEventListener('click', function () {
          var tags = (node.getAttribute('data-tags') || '').split(/\s+/).filter(Boolean);
          var nextFocus = 'overview';
          for (var index = 0; index < tags.length; index += 1) {
            if (tags[index] !== 'overview') {
              nextFocus = tags[index];
              break;
            }
          }
          applyFocus(nextFocus);
          nodes.forEach(function (item) { item.classList.remove('selected'); });
          node.classList.add('selected');
        });
      });

      applyFocus('overview');
    })();
  ]]></script>
</svg>