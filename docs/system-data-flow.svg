        stroke-width: 2.8;
      }
      .node-card.dimmed {
        opacity: 0.22;
      }
      .edge {
        fill: none;
        stroke: #7c8b97;
        stroke-width: 1.8;
        marker-end: url(#arrow);
        vector-effect: non-scaling-stroke;
        transition: 0.2s ease;
      }
      .edge.active {
        stroke: #1b6ea8;
        stroke-width: 2.5;
      }
      .edge.dimmed {
        opacity: 0.18;
      }
      .edge-label {
        font-size: 11px;
        fill: #607180;
      }
      .legend-chip {
        rx: 10;
      }
      .legend-text {
        font-size: 13px;
        fill: #314b61;
      }
      .pill {
        fill: #eff5fa;
        stroke: #b8c7d4;
        stroke-width: 1;
        rx: 14;
      }
      .pill-text {
        font-size: 13px;
        font-weight: 700;
        fill: #2f536f;
      }
    ]]></style>
  </defs>

  <rect x="0" y="0" width="1180" height="980" fill="url(#bg)" />

  <text x="70" y="72" font-size="38" font-weight="800" fill="#173c63">设备点检系统交互式数据流图</text>
  <text x="70" y="105" font-size="18" fill="#5b6a77">点击顶部场景按钮切换视角，点击任意模块卡片高亮对应流程。图示聚焦裁判最需要理解的主业务链路。</text>

