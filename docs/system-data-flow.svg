<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1180 980" role="img" aria-labelledby="title desc">
  <title id="title">设备点检系统交互式数据流图</title>
  <desc id="desc">通过角色、前端模块和 Pages Functions API 展示整个系统的关键业务流。点击顶部场景按钮或任意模块卡片可高亮对应业务闭环。</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f4efe6" />
      <stop offset="55%" stop-color="#f9f7f3" />
      <stop offset="100%" stop-color="#e5ecf2" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#10243a" flood-opacity="0.12" />
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="7" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7c8b97" />
    </marker>
    <style><![CDATA[
      svg {
